services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      POSTGRES_DB: ${POSTGRES_DB:-deep_search_results}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-deep_search_results}"]
      interval: 5s
      timeout: 5s
      retries: 10

  init-db:
    build:
      context: .
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      POSTGRES_DB: ${POSTGRES_DB:-deep_search_results}
      MAX_CONCURRENT_SCRAPES: ${MAX_CONCURRENT_SCRAPES:-5}
    depends_on:
      db:
        condition: service_healthy
    command: ["python", "scripts/init_db.py"]
    restart: "no"

  api:
    build:
      context: .
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      POSTGRES_DB: ${POSTGRES_DB:-deep_search_results}
      MAX_CONCURRENT_SCRAPES: ${MAX_CONCURRENT_SCRAPES:-5}
    ports:
      - "8007:8000"
    depends_on:
      db:
        condition: service_healthy
      init-db:
        condition: service_completed_successfully

  frontend:
    image: python:3.12-slim
    working_dir: /frontend
    volumes:
      - ./frontend:/frontend:ro
    command: ["python", "-m", "http.server", "5174", "--bind", "0.0.0.0"]
    ports:
      - "5174:5174"
    depends_on:
      - api

volumes:
  postgres_data:
